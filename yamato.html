<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ヤマト運輸 荷物問い合わせへ移動中...</title>
<style>
  body { font-family: Meiryo, sans-serif; padding: 2em; line-height: 1.8; }
  #fallback { display: none; margin-top: 1em; }
</style>
</head>
<body>
  <p id="status">送り状番号を入力して、ヤマト運輸の問い合わせページへ移動しています…</p>

  <form id="relay-form" method="post" action="https://toi.kuronekoyamato.co.jp/cgi-bin/tneko" style="display:none;">
    <input type="hidden" name="number01" id="number01">
  </form>

  <p id="fallback">
    自動的に移動しない場合は、こちらをクリックしてください。<br>
    <a id="manual-link" href="https://toi.kuronekoyamato.co.jp/cgi-bin/tneko" target="_blank">
      ヤマト運輸 荷物問い合わせページを開く
    </a>
    （送り状番号: <span id="manual-number"></span> は自動入力されないので手動でご入力ください）
  </p>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var raw = (params.get('number') || '').trim();
      var digitsOnly = raw.replace(/[^0-9]/g, '');
      var statusEl = document.getElementById('status');
      var fallbackEl = document.getElementById('fallback');
      var manualNumberEl = document.getElementById('manual-number');

      manualNumberEl.textContent = raw || '(指定なし)';
      fallbackEl.style.display = 'block';

      // ヤマトの送り状番号は12桁が基本だが、桁数チェックは緩めにしておく
      if (digitsOnly.length < 10 || digitsOnly.length > 14) {
        statusEl.textContent = '送り状番号が正しく指定されていません（自動入力をスキップしました）。';
        return;
      }

      document.getElementById('number01').value = digitsOnly;
      document.getElementById('relay-form').submit();
    })();
  </script>
</body>
</html>
